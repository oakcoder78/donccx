<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Donc · Web UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/feather-icons"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; font-family: var(--font-body); color: var(--fg-2); background: var(--bg); }
  .view-switch {
    position: fixed; top: 14px; right: 14px; z-index: 999;
    display: inline-flex; gap: 4px; padding: 4px;
    background: rgba(255,255,255,0.86); backdrop-filter: blur(20px);
    border: 1px solid var(--border-1); border-radius: 999px;
    box-shadow: var(--shadow-sm);
  }
  .view-switch button {
    border: 0; background: transparent;
    font-family: var(--font-body); font-weight: 600; font-size: 12px;
    padding: 6px 12px; border-radius: 999px;
    color: var(--fg-3); cursor: pointer;
  }
  .view-switch button.active { background: var(--navy-700); color: #fff; }
</style>
</head>
<body>
<div id="app" data-screen-label="Web UI kit"></div>

<script type="text/babel" src="./Primitives.jsx"></script>
<script type="text/babel" src="./Shell.jsx"></script>
<script type="text/babel" src="./Dashboard.jsx"></script>
<script type="text/babel" src="./RoutePlanner.jsx"></script>
<script type="text/babel" src="./Marketing.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState(() => localStorage.getItem("donc_web_view") || "marketing");
  const [active, setActive] = useState("overview");

  useEffect(() => { localStorage.setItem("donc_web_view", view); }, [view]);
  useEffect(() => {
    if (view !== "marketing") {
      setActive(view === "routes" ? "routes" : "overview");
    }
  }, [view]);

  const Switch = (
    <div className="view-switch">
      <button className={view === "marketing" ? "active" : ""} onClick={() => setView("marketing")}>Marketing</button>
      <button className={view === "overview"  ? "active" : ""} onClick={() => setView("overview")}>Painel</button>
      <button className={view === "routes"    ? "active" : ""} onClick={() => setView("routes")}>Rotas</button>
    </div>
  );

  if (view === "marketing") {
    return (<>{Switch}<Marketing onEnter={() => setView("overview")} /></>);
  }
  const isRoutes = view === "routes";
  return (
    <>
      {Switch}
      <Shell
        active={isRoutes ? "routes" : "overview"}
        onChange={(id) => setView(id === "routes" ? "routes" : "overview")}
        title={isRoutes ? "Rotas" : "Visão geral"}
        breadcrumb={isRoutes ? "Operações · Rotas" : "Operações"}
      >
        {isRoutes ? <RoutePlanner /> : <Dashboard />}
      </Shell>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
