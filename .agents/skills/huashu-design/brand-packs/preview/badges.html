<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; box-sizing: border-box; padding: 28px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-body); font-weight: 600; font-size: 12px;
    padding: 4px 10px; border-radius: var(--r-pill);
    letter-spacing: -0.005em;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .b-success { background: var(--success-100); color: #1e7a4d; }
  .b-warn    { background: var(--warning-100); color: #8a6310; }
  .b-danger  { background: var(--danger-100);  color: #9b2e2e; }
  .b-info    { background: var(--sky-100);     color: var(--sky-700); }
  .b-neutral { background: var(--ink-100);     color: var(--ink-700); }
  .b-accent  { background: var(--lime-100);    color: var(--lime-700); }

  .b-outline {
    background: transparent;
    box-shadow: inset 0 0 0 1px var(--border-2);
    color: var(--fg-3);
  }
  .label { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--fg-4); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">Status badges</div>
    <div class="row">
      <span class="badge b-success"><span class="dot"></span>Concluída</span>
      <span class="badge b-warn"><span class="dot"></span>SLA em risco</span>
      <span class="badge b-danger"><span class="dot"></span>Atrasada</span>
      <span class="badge b-info"><span class="dot"></span>Em rota</span>
      <span class="badge b-neutral"><span class="dot"></span>Agendada</span>
      <span class="badge b-accent">Novo</span>
    </div>
    <div class="row">
      <span class="badge b-outline">OS #482931</span>
      <span class="badge b-outline">Rota SP-03</span>
      <span class="badge b-outline">Assembly</span>
      <span class="badge b-outline">Prioridade alta</span>
    </div>
  </div>
</body>
</html>
