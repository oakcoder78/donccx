<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card { width: 700px; box-sizing: border-box; padding: 28px 32px; }
  .display { font-size: 64px; color: var(--navy-900); margin: 0 0 4px; }
  .caption { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); letter-spacing: 0; }
  .split { display: flex; gap: 24px; align-items: baseline; margin-top: 6px; }
  .h1 { font-family: var(--font-display); font-weight: 700; font-size: 44px; letter-spacing: -0.03em; line-height: 1.05; color: var(--navy-900); margin: 0; }
  .h2 { font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: -0.02em; line-height: 1.1; color: var(--navy-900); margin: 0; }
</style>
</head>
<body>
  <div class="card">
    <h1 class="display">Cada entrega, sob controle.</h1>
    <div class="caption">Montserrat 800 · 64/1.05 · letter-spacing −0.03em</div>
    <div class="split">
      <div>
        <h2 class="h1">Planeje o dia</h2>
        <div class="caption">H1 · Montserrat 700 · 44/1.05</div>
      </div>
      <div>
        <h3 class="h2">48 rotas ativas</h3>
        <div class="caption">H2 · Montserrat 700 · 30/1.1</div>
      </div>
    </div>
  </div>
</body>
</html>
