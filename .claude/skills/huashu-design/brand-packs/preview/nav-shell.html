<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/feather-icons"></script>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-subtle); }
  .wrap { width: 700px; box-sizing: border-box; padding: 20px; display: grid; grid-template-columns: 180px 1fr; gap: 16px; }
  .side {
    background: var(--white); border: 1px solid var(--border-1); border-radius: var(--r-lg);
    padding: 14px 10px; box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; gap: 2px;
  }
  .brand { display:flex; gap: 8px; align-items:center; padding: 6px 10px 14px; border-bottom: 1px solid var(--divider); margin-bottom: 8px; }
  .brand img { height: 18px; }
  .nav {
    display: flex; gap: 10px; align-items: center;
    padding: 9px 12px; border-radius: var(--r-md);
    font-family: var(--font-body); font-weight: 500; font-size: 13px; color: var(--fg-2);
    cursor: pointer;
  }
  .nav svg { width: 16px; height: 16px; stroke-width: 1.5; }
  .nav:hover { background: var(--ink-50); }
  .nav.active { background: var(--navy-700); color: #fff; font-weight: 600; }
  .nav .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
  .nav.active .count { color: rgba(255,255,255,0.7); }

  .topbar {
    background: var(--white); border: 1px solid var(--border-1); border-radius: var(--r-lg);
    padding: 10px 14px; display: flex; gap: 10px; align-items: center;
    box-shadow: var(--shadow-sm);
  }
  .search {
    flex: 1; display: flex; gap: 8px; align-items: center;
    border: 1px solid var(--border-2); border-radius: var(--r-md);
    padding: 7px 12px; color: var(--fg-4); font-size: 13px;
  }
  .search svg { width: 14px; height: 14px; stroke-width: 1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="side">
      <div class="brand"><img src="../assets/logo-donc-navy.png"></div>
      <div class="nav active"><i data-feather="home"></i>Visão geral</div>
      <div class="nav"><i data-feather="clipboard"></i>Ordens<span class="count">128</span></div>
      <div class="nav"><i data-feather="map"></i>Rotas</div>
      <div class="nav"><i data-feather="users"></i>Equipes</div>
      <div class="nav"><i data-feather="bar-chart-2"></i>Relatórios</div>
      <div class="nav"><i data-feather="settings"></i>Ajustes</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="topbar">
        <div class="search"><i data-feather="search"></i>Buscar OS, cliente, técnico…</div>
        <div style="width:32px;height:32px;border-radius:50%;background:var(--sky-100);color:var(--sky-700);font-family:var(--font-display);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center">RM</div>
      </div>
      <div style="flex:1; background: var(--white); border:1px solid var(--border-1); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); padding: 14px; font-family: var(--font-display); font-weight:700; color: var(--navy-900); font-size: 15px">Painel de operações</div>
    </div>
  </div>
  <script>feather.replace({ 'stroke-width': 1.5 });</script>
</body>
</html>
