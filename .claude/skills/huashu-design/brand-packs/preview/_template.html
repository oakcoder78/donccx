<!-- Shared base wrapper for preview cards.
     Each card is a 700px-wide HTML file that imports colors_and_type.css.
     The Design System tab captures them at ~700×<height>. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=700">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); }
  .card {
    width: 700px;
    box-sizing: border-box;
    padding: 24px 28px;
    font-family: var(--font-body);
    color: var(--fg-2);
  }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .spread { display: flex; gap: 12px; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
  <div class="card"></div>
</body>
</html>
